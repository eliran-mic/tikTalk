name: Deploy to GKE

on:
  push:
    branches: [main]

env:
  PROJECT_ID: dharma-bot
  REGION: us-central1
  GAR_REPO: synthesizer
  IMAGE: synthesizer
  GKE_CLUSTER: synthesizer-cluster
  GKE_ZONE: us-central1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Deploy to GKE
        run: |
          IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_TAG|g" k8s/deployment.yml

          # 1. Secrets first (other resources depend on them)
          kubectl apply -f k8s/secrets.yml

          # 2. Postgres (app depends on it)
          kubectl apply -f k8s/postgres.yml
          kubectl rollout status statefulset/postgres --timeout=120s

          # 3. App deployment and ClusterIP service
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml

          # 4. Gateway infrastructure
          kubectl apply -f k8s/cert-manager.yml
          kubectl apply -f k8s/gateway.yml
          kubectl apply -f k8s/rate-limit.yml
