apiVersion: apps/v1
kind: Deployment
metadata:
  name: synthesizer
  labels:
    app: synthesizer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: synthesizer
  template:
    metadata:
      labels:
        app: synthesizer
    spec:
      containers:
        - name: synthesizer
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: synthesizer-secrets
                  key: DATABASE_URL
            - name: CRON_SECRET
              valueFrom:
                secretKeyRef:
                  name: synthesizer-secrets
                  key: CRON_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: synthesizer-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/agents
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/agents
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
