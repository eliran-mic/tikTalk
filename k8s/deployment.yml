apiVersion: apps/v1
kind: Deployment
metadata:
  name: tiktalk
  labels:
    app: tiktalk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tiktalk
  template:
    metadata:
      labels:
        app: tiktalk
    spec:
      containers:
        - name: tiktalk
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tiktalk-secrets
                  key: DATABASE_URL
            - name: CRON_SECRET
              valueFrom:
                secretKeyRef:
                  name: tiktalk-secrets
                  key: CRON_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tiktalk-secrets
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tiktalk-secrets
                  key: OPENAI_API_KEY
            - name: NEXT_PUBLIC_APP_URL
              valueFrom:
                secretKeyRef:
                  name: tiktalk-secrets
                  key: NEXT_PUBLIC_APP_URL
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: tiktalk-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tiktalk-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: FACEBOOK_APP_ID
              valueFrom:
                secretKeyRef:
                  name: tiktalk-secrets
                  key: FACEBOOK_APP_ID
            - name: FACEBOOK_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: tiktalk-secrets
                  key: FACEBOOK_APP_SECRET
            - name: LINKEDIN_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: tiktalk-secrets
                  key: LINKEDIN_CLIENT_ID
            - name: LINKEDIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tiktalk-secrets
                  key: LINKEDIN_CLIENT_SECRET
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/agents
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/agents
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
