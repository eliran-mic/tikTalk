apiVersion: batch/v1
kind: CronJob
metadata:
  name: tiktalk-trend-ingestion
spec:
  schedule: "*/30 * * * *"  # Every 30 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: trend-ingestion
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  curl -sf -X POST \
                    -H "Authorization: Bearer $(CRON_SECRET)" \
                    -H "Content-Type: application/json" \
                    http://tiktalk/api/trends/ingest
              env:
                - name: CRON_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: tiktalk-secrets
                      key: CRON_SECRET
