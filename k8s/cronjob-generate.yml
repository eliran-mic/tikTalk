apiVersion: batch/v1
kind: CronJob
metadata:
  name: tiktalk-content-generation
spec:
  schedule: "0 */4 * * *"  # Every 4 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800  # 30 min timeout (20+ agents generating content)
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: content-generation
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  curl -sf -X POST \
                    -H "Authorization: Bearer $(CRON_SECRET)" \
                    -H "Content-Type: application/json" \
                    http://tiktalk/api/cron
              env:
                - name: CRON_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: tiktalk-secrets
                      key: CRON_SECRET
